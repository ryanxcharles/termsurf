<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TermSurf 407 PoC</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  color: #eee;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
}
#identity {
  font-size: 24px;
  letter-spacing: 4px;
  color: #6af;
}
canvas {
  display: block;
}
#fps {
  font-size: 18px;
  color: #999;
}
</style>
</head>
<body>
<div id="identity"></div>
<canvas id="canvas" width="300" height="300"></canvas>
<div id="fps"></div>
<script>
(function() {
  // --- localStorage identity ---
  var key = 'termsurf-poc-identity';
  var identity = localStorage.getItem(key);
  if (!identity) {
    var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    identity = '';
    for (var i = 0; i < 8; i++) {
      identity += chars[Math.floor(Math.random() * chars.length)];
    }
    localStorage.setItem(key, identity);
  }
  document.getElementById('identity').textContent = identity;

  // --- Canvas setup ---
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var size = canvas.width;
  var half = size / 2;
  var squareSize = size * 0.4;

  // --- FPS tracking ---
  var timestamps = new Array(60);
  var tsIndex = 0;
  var tsCount = 0;
  var lastFpsUpdate = 0;
  var displayFps = 0;

  function frame(now) {
    // Track timestamp
    timestamps[tsIndex] = now;
    tsIndex = (tsIndex + 1) % 60;
    if (tsCount < 60) tsCount++;

    // Update FPS display once per second
    if (now - lastFpsUpdate >= 1000) {
      if (tsCount >= 2) {
        var oldest = timestamps[(tsIndex - tsCount + 60) % 60];
        var newest = timestamps[(tsIndex - 1 + 60) % 60];
        var elapsed = newest - oldest;
        if (elapsed > 0) {
          displayFps = ((tsCount - 1) / elapsed * 1000).toFixed(1);
        }
      }
      document.getElementById('fps').textContent = displayFps + ' fps';
      lastFpsUpdate = now;
    }

    // --- Draw spinning square ---
    var angleDeg = (now / 1000) * 360; // 360 deg/sec = 1 Hz
    var angleRad = angleDeg * Math.PI / 180;

    ctx.clearRect(0, 0, size, size);
    ctx.save();
    ctx.translate(half, half);
    ctx.rotate(angleRad);
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(-squareSize / 2, -squareSize / 2, squareSize, squareSize);
    ctx.restore();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
