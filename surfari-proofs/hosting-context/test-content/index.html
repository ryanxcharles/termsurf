<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TermSurf WebKit Hosting Proof</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 1400px;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: #10151f;
        color: #f6f1e8;
      }

      main {
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
      }

      .marker {
        width: 92px;
        height: 92px;
        margin: 28px 0;
        background: #44d7b6;
        animation: pulse 900ms infinite alternate ease-in-out;
      }

      .target {
        margin-top: 840px;
        padding: 28px;
        background: #273549;
      }

      .target.updated {
        background: #f25f5c;
        color: #10151f;
        font-weight: 700;
      }

      @keyframes pulse {
        from {
          transform: translateX(0);
          border-radius: 8px;
        }

        to {
          transform: translateX(220px);
          border-radius: 46px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Issue 756 WebKit owner page</h1>
      <p>This page is rendered by the owner process WKWebView.</p>
      <div class="marker"></div>
      <p id="status">Initial page loaded.</p>
      <div class="target" id="target">Scroll target before navigation.</div>
    </main>
    <script>
      setTimeout(() => {
        document.getElementById("status").textContent = "Owner page updated by JavaScript animation tick.";
        document.getElementById("target").textContent = "Dynamic JavaScript update visible after scroll.";
        document.getElementById("target").classList.add("updated");
        document.body.style.background = "#f25f5c";
        document.body.style.color = "#10151f";
        window.scrollTo(0, 720);
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.proof) {
          window.webkit.messageHandlers.proof.postMessage({
            event: "scrolled",
            scrollY: window.scrollY,
            status: document.getElementById("status").textContent,
          });
        }
      }, 1800);
    </script>
  </body>
</html>
