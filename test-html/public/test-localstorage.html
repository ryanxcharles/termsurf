<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>localStorage Persistence Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1b26;
  color: #c0caf5;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 24px;
}
h1 { color: #7aa2f7; font-size: 28px; }
.count { font-size: 96px; color: #7dcfff; font-weight: bold; }
.label { color: #565f89; font-size: 18px; }
.status { color: #9ece6a; font-size: 16px; max-width: 500px; text-align: center; line-height: 1.6; }
button {
  background: #24283b;
  color: #c0caf5;
  border: 1px solid #565f89;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: #414868; }
</style>
</head>
<body>
<h1>localStorage Persistence Test</h1>
<div class="count" id="count">-</div>
<div class="label">visit count</div>
<div class="status" id="status"></div>
<button onclick="resetStorage()">Reset Counter</button>

<script>
function resetStorage() {
  localStorage.removeItem('ts_visit_count');
  location.reload();
}

var prev = localStorage.getItem('ts_visit_count');
var count = prev ? parseInt(prev, 10) + 1 : 1;
localStorage.setItem('ts_visit_count', String(count));

document.getElementById('count').textContent = count;

var el = document.getElementById('status');
if (count === 1) {
  el.textContent = 'localStorage set. Quit Roamium, reopen, and reload this page. If the count increases, localStorage persists.';
} else {
  el.textContent = 'localStorage is persisting! This is visit #' + count + '.';
}
</script>
</body>
</html>
