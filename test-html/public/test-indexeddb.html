<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>IndexedDB Persistence Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1b26;
  color: #c0caf5;
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 24px;
}
h1 { color: #7aa2f7; font-size: 28px; }
.count { font-size: 96px; color: #7dcfff; font-weight: bold; }
.label { color: #565f89; font-size: 18px; }
.status { color: #9ece6a; font-size: 16px; max-width: 500px; text-align: center; line-height: 1.6; }
.fail { color: #f7768e; }
button {
  background: #24283b;
  color: #c0caf5;
  border: 1px solid #565f89;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: #414868; }
</style>
</head>
<body>
<h1>IndexedDB Persistence Test</h1>
<div class="count" id="count">-</div>
<div class="label">visit count</div>
<div class="status" id="status">Opening database...</div>
<button onclick="resetDb()">Reset Counter</button>

<script>
var DB_NAME = 'ts_persistence_test';
var STORE_NAME = 'visits';

function openDb(callback) {
  var req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = function(e) {
    var db = e.target.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) {
      db.createObjectStore(STORE_NAME);
    }
  };
  req.onsuccess = function(e) { callback(null, e.target.result); };
  req.onerror = function(e) { callback(e.target.error, null); };
}

function getCount(db, callback) {
  var tx = db.transaction(STORE_NAME, 'readonly');
  var store = tx.objectStore(STORE_NAME);
  var req = store.get('count');
  req.onsuccess = function() { callback(req.result || 0); };
  req.onerror = function() { callback(0); };
}

function setCount(db, count, callback) {
  var tx = db.transaction(STORE_NAME, 'readwrite');
  var store = tx.objectStore(STORE_NAME);
  store.put(count, 'count');
  tx.oncomplete = function() { callback(); };
  tx.onerror = function() { callback(); };
}

function resetDb() {
  indexedDB.deleteDatabase(DB_NAME);
  location.reload();
}

openDb(function(err, db) {
  var countEl = document.getElementById('count');
  var statusEl = document.getElementById('status');

  if (err) {
    countEl.textContent = '!';
    statusEl.textContent = 'IndexedDB error: ' + err.message;
    statusEl.className = 'status fail';
    return;
  }

  getCount(db, function(prev) {
    var count = prev + 1;
    setCount(db, count, function() {
      db.close();
      countEl.textContent = count;
      if (count === 1) {
        statusEl.textContent = 'IndexedDB set. Quit Roamium, reopen, and reload this page. If the count increases, IndexedDB persists.';
      } else {
        statusEl.textContent = 'IndexedDB is persisting! This is visit #' + count + '.';
      }
    });
  });
});
</script>
</body>
</html>
