<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Surfari ABI Navigation Page</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #113322;
        color: #f4fff8;
        min-height: 1800px;
      }

      main {
        padding: 24px;
      }

      #input-target {
        position: absolute;
        left: 360px;
        top: 270px;
        width: 220px;
        height: 32px;
        cursor: text;
      }

      #scroll-target {
        margin-top: 500px;
        height: 900px;
      }

      #target-link {
        position: absolute;
        left: 360px;
        top: 96px;
        padding: 8px 12px;
        background: #2f81f7;
        color: #ffffff;
        cursor: pointer;
      }

      #pointer-region {
        cursor: default;
      }

      #hand-region {
        position: absolute;
        left: 360px;
        top: 220px;
        width: 220px;
        height: 32px;
        cursor: pointer;
        user-select: none;
        background: #8b949e;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Surfari ABI Navigation Page</h1>
      <input id="input-target" />
      <div id="pointer-region">Pointer region</div>
      <div id="hand-region">Hand cursor region</div>
      <a
        id="target-link"
        href="https://example.test/surfari-target"
        title="Surfari target link"
        >Surfari target URL</a
      >
      <div id="scroll-target">Scroll target</div>
      <p>This page proves navigation through the C ABI.</p>
    </main>
    <script>
      window.__surfariState = {
        focus: false,
        focusIn: false,
        blur: false,
        move: "",
        click: "",
        scroll: 0,
        key: "",
        colorScheme: matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light",
      };

      window.addEventListener("focus", () => {
        window.__surfariState.focus = true;
      });
      window.addEventListener("focusin", () => {
        window.__surfariState.focusIn = true;
      });
      window.addEventListener("blur", () => {
        window.__surfariState.blur = true;
      });
      window.addEventListener("mousemove", (event) => {
        window.__surfariState.move = `${event.clientX},${event.clientY}`;
      });
      window.addEventListener("click", (event) => {
        window.__surfariState.click = `${event.clientX},${event.clientY},${event.button}`;
      });
      window.addEventListener(
        "wheel",
        (event) => {
          window.__surfariState.scroll += Math.round(event.deltaY);
        },
        { passive: true },
      );
      window.addEventListener("keydown", (event) => {
        window.__surfariState.key += event.key;
      });
      matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (event) => {
        window.__surfariState.colorScheme = event.matches ? "dark" : "light";
      });

      window.__surfariEmitConsoleMessages = () => {
        console.log("surfari-log", 42, true);
        console.info("surfari-info", ["alpha", 7]);
        console.warn("surfari-warn", { kind: "object", count: 2 });
        console.error("surfari-error", null);
        return "console-started";
      };
    </script>
  </body>
</html>
